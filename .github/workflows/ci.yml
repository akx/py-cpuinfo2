name: CI

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  lint:
    name: Lint with Prek
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7.6.0
      - uses: j178/prek-action@v2
  test:
    name: Python Tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7.6.0
      with:
        python-version: ${{ matrix.python-version }}
        activate-environment: 'true'
    - run: uv run --python=python cpuinfo
    - run: uv run --with=pytest-xdist pytest --cov --dist=worksteal -nlogical
      env:
        CPUINFO_REQUIRE_BITS: '64'
  test-x86:
    needs: [test]
    name: Python Tests (x86)
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x86
    - uses: astral-sh/setup-uv@v7.6.0
    - run: uv run --python=python cpuinfo
    - run: uv run --with=pytest-xdist --python python pytest --cov --dist=worksteal -nlogical
      env:
        CPUINFO_REQUIRE_BITS: '32'
  test-qemu:
    needs: [test]
    name: Smoke test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/arm64
          - platform: linux/arm/v7
          - platform: linux/ppc64le
          - platform: linux/s390x
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: docker/setup-qemu-action@v4
    - run: >
        docker run --rm --platform ${{ matrix.platform }}
        -v ${{ github.workspace }}:/work -w /work
        python:3.13-slim
        sh -c "pip install --quiet -e . pytest && python -m pytest tests/test_actual.py tests/test_cli.py -v && cpuinfo"
  test-pyinstaller:
    needs: [test]
    name: PyInstaller test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7.6.0
      with:
        python-version: '3.12'
        activate-environment: 'true'
    - run: uv run --with=pyinstaller pytest tests/test_pyinstaller.py -v
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7.6.0
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
  publish:
    name: Publish to PyPI
    needs: [test, test-x86, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
